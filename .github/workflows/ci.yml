name: DevOps Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: flake8 app.py
  test:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t mastere-devops .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Simulated deploy
        run: echo "Deploy OK"

